services:
  postgres:
    image: postgres:16-alpine
    container_name: dt-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dt_intranet
      POSTGRES_USER: dt
      POSTGRES_PASSWORD: dt_local_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
